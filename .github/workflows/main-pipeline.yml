name: 每日量化流水线（盘后）

on:
  schedule:
    - cron: '30 10 * * *'   # 工作日北京时间 18:30（UTC 10:30）
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      WORK_DIR: /home/runner/work/quant-workspace
      REGISTRY_PATH: /home/runner/work/quant-workspace/strategy_registry.json
    steps:
      - name: 检出总控仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装通用依赖
        run: |
          pip install tickflow tushare pandas pyyaml

      - name: 创建工作目录（如不存在）
        run: mkdir -p $WORK_DIR

      - name: 复制市场状态配置文件
        run: |
          cp market_regime_config.yaml $WORK_DIR/market_regime_config.yaml

      - name: 拉取/更新项目代码
        run: |
          chmod +x scripts/update_projects.sh
          ./scripts/update_projects.sh

      - name: 初始化策略注册表（首次运行）
        run: |
          if [ ! -f "$REGISTRY_PATH" ]; then
            cp strategy_registry.json $REGISTRY_PATH
          fi

      - name: 注入环境变量到 daily_stock_analysis
        run: |
          cd $WORK_DIR/daily_stock_analysis
          cp .env.example .env || true
          echo "STOCK_LIST=${{ secrets.STOCK_LIST }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}" >> .env
          echo "OPENAI_MODEL=openai/${{ secrets.OPENAI_MODEL }}" >> .env
          echo "TUSHARE_TOKEN=${{ secrets.TUSHARE_TOKEN }}" >> .env
          echo "DATA_SOURCE_PRIORITY=tickflow,tushare,akshare,baostock,yfinance" >> .env
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" >> .env
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
          echo "EMAIL_RECEIVERS=${{ secrets.EMAIL_RECEIVERS }}" >> .env
          echo "SECRET_KEY=$(openssl rand -hex 32)" >> .env

      # ========== 改进后的 TickFlow 补丁（大盘复盘） ==========
      - name: 应用 TickFlow 补丁（大盘复盘）
        run: |
          cd $WORK_DIR/daily_stock_analysis
          python $GITHUB_WORKSPACE/scripts/patch_tickflow.py
          # 验证补丁是否生效
          python -c "
from data_provider.tushare_fetcher import TushareFetcher
import inspect
print('TushareFetcher.get_daily_data 定义文件:', inspect.getfile(TushareFetcher.get_daily_data))
if 'patch_tickflow' in inspect.getfile(TushareFetcher.get_daily_data):
    print('✅ 补丁已生效')
else:
    print('⚠️ 补丁未生效，请检查')
"

      - name: 大盘复盘（生成今日信号）
        run: |
          cd $WORK_DIR/daily_stock_analysis
          python main.py --market-review --no-notify
        env:
          ALPHASIFT_ENABLED: false

      - name: 市场状态感知（v2.0 相对分位数法）
        run: |
          python scripts/market_regime.py
        env:
          WORK_DIR: ${{ env.WORK_DIR }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

      - name: 策略自动选择（v2.0 标签软匹配 + 置信度门禁）
        id: select_strategy
        run: |
          python scripts/select_strategy.py
        env:
          WORK_DIR: ${{ env.WORK_DIR }}
          REGISTRY_PATH: ${{ env.REGISTRY_PATH }}

      - name: AlphaSift 选股
        run: |
          cd $WORK_DIR/alphasift
          pip install -e . || true
          STRATEGY="${{ steps.select_strategy.outputs.alpha_sift_strategy }}"
          echo "使用策略: $STRATEGY"
          alphasift screen $STRATEGY --no-llm --save-run
          latest_json=$(ls -t data/runs/*.json 2>/dev/null | head -1)
          if [ -z "$latest_json" ]; then
            echo "错误：未生成选股结果 JSON"
            exit 1
          fi
          echo "选股结果 JSON: $latest_json"
          mkdir -p $WORK_DIR/daily_stock_analysis/data
          python $GITHUB_WORKSPACE/scripts/convert_alphasift_json_to_csv.py "$latest_json" $WORK_DIR/daily_stock_analysis/data/stock_pool.csv
          if [ $? -eq 0 ]; then
            echo "选股结果已保存到 shared/stock_pool.csv"
          else
            echo "错误：转换 CSV 失败"
            exit 1
          fi
        env:
          ALPHASIFT_ENABLED: true

      # ===== 确认 ALPHAEVO_DSA_PATH 配置 =====
      - name: 确认 ALPHAEVO_DSA_PATH 配置
        run: |
          echo "🔍 检查 ALPHAEVO_DSA_PATH 配置..."
          echo "  路径: $ALPHAEVO_DSA_PATH"
          if [ -d "$ALPHAEVO_DSA_PATH" ]; then
            echo "  ✅ 目录已存在"
            echo "  内容:"
            ls -la "$ALPHAEVO_DSA_PATH" | head -20 || echo "  (空目录)"
          else
            echo "  ⚠️ 目录不存在，正在创建..."
            mkdir -p "$ALPHAEVO_DSA_PATH"
            echo "  ✅ 目录已创建"
          fi
          CACHE_FILES=$(find "$ALPHAEVO_DSA_PATH" -name "*.parquet" -o -name "*.feather" -o -name "*.csv" 2>/dev/null | wc -l)
          echo "  缓存文件数: $CACHE_FILES"
          if [ "$CACHE_FILES" -eq 0 ]; then
            echo "  ⚠️ 缓存目录为空，AlphaEvo DSA 适配器将使用空缓存（可能回退到 yfinance）"
          else
            echo "  ✅ 缓存数据存在，AlphaEvo DSA 适配器可正常工作"
          fi
        env:
          ALPHAEVO_DSA_PATH: ${{ env.WORK_DIR }}/daily_stock_analysis/data/cache

      - name: AlphaEvo 回测验证
        id: alphaevo_backtest
        env:
          ALPHAEVO_DSA_PATH: ${{ env.WORK_DIR }}/daily_stock_analysis/data/cache
        run: |
          cd $WORK_DIR/alphaevo
          mkdir -p data reports
          STRATEGY="${{ steps.select_strategy.outputs.alphaevo_strategy }}"
          echo "AlphaEvo 使用策略: $STRATEGY"
          echo "ALPHAEVO_DSA_PATH: $ALPHAEVO_DSA_PATH"
          if alphaevo run "$STRATEGY" --adapter dsa --output reports/ 2>/dev/null; then
            echo "✅ AlphaEvo 回测成功 (DSA 缓存数据)"
            echo "backtest_success=true" >> $GITHUB_OUTPUT
          elif alphaevo run "$STRATEGY" --adapter yfinance --output reports/ 2>/dev/null; then
            echo "✅ AlphaEvo 回测成功 (yfinance)"
            echo "backtest_success=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ AlphaEvo 回测失败"
            echo "backtest_success=false" >> $GITHUB_OUTPUT
          fi

      - name: 解析回测报告
        run: |
          python scripts/parse_alphaevo_report.py
        env:
          WORK_DIR: ${{ env.WORK_DIR }}
          STRATEGY_ID: ${{ steps.select_strategy.outputs.selected_strategy }}

      - name: 更新策略注册表
        run: |
          python scripts/update_strategy_registry.py
        env:
          WORK_DIR: ${{ env.WORK_DIR }}
          REGISTRY_PATH: ${{ env.REGISTRY_PATH }}
          STRATEGY_ID: ${{ steps.select_strategy.outputs.selected_strategy }}

      - name: 定价计算器
        run: |
          python scripts/pricing_calculator.py
        env:
          WORK_DIR: ${{ env.WORK_DIR }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

      # ========== 改进后的 TickFlow 补丁（完整分析） ==========
      - name: 应用 TickFlow 补丁（完整分析）
        run: |
          cd $WORK_DIR/daily_stock_analysis
          python $GITHUB_WORKSPACE/scripts/patch_tickflow.py
          # 再次验证
          python -c "
from data_provider.tushare_fetcher import TushareFetcher
import inspect
print('TushareFetcher.get_daily_data 定义文件:', inspect.getfile(TushareFetcher.get_daily_data))
if 'patch_tickflow' in inspect.getfile(TushareFetcher.get_daily_data):
    print('✅ 补丁已生效')
else:
    print('⚠️ 补丁未生效，请检查')
"

      # ===== 用选股结果覆盖 STOCK_LIST =====
      - name: 用选股结果覆盖 STOCK_LIST（如有）
        run: |
          cd $WORK_DIR/daily_stock_analysis
          if [ -f "data/stock_pool.csv" ] && [ -s "data/stock_pool.csv" ]; then
            CODES=$(tail -n +2 data/stock_pool.csv | cut -d',' -f1 | tr '\n' ',' | sed 's/,$//')
            if [ -n "$CODES" ]; then
              sed -i '/^STOCK_LIST=/d' .env
              echo "STOCK_LIST=$CODES" >> .env
              echo "✅ 已用选股结果覆盖 STOCK_LIST: $CODES"
            else
              echo "⚠️ 选股结果为空，保留原 STOCK_LIST"
            fi
          else
            echo "⚠️ stock_pool.csv 不存在或为空，保留原 STOCK_LIST"
          fi

      - name: daily_stock_analysis 分析与推送
        run: |
          cd $WORK_DIR/daily_stock_analysis
          cp $WORK_DIR/pricing.md data/pricing.md || true
          python main.py
        env:
          ALPHASIFT_ENABLED: false

      - name: 判断是否运行 AlphaEvo 进化
        id: check_evo
        run: |
          DOW=$(date +%u)
          DOM=$(date +%d)
          MONITOR_STRATEGY=$(jq -r '.strategies[] | select(.status=="monitor") | .id' $REGISTRY_PATH | head -1)
          if [ "$DOW" = "5" ] || [ "$DOM" = "01" ] || [ -n "$MONITOR_STRATEGY" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_evo=true" >> $GITHUB_OUTPUT
            echo "monitor_strategy=$MONITOR_STRATEGY" >> $GITHUB_OUTPUT
          else
            echo "run_evo=false" >> $GITHUB_OUTPUT
          fi

      - name: AlphaEvo 策略进化（条件触发）
        if: steps.check_evo.outputs.run_evo == 'true'
        run: |
          cd $WORK_DIR/alphaevo
          MONITOR_STRATEGY="${{ steps.check_evo.outputs.monitor_strategy }}"
          DOM=$(date +%d)
          if [ -n "$MONITOR_STRATEGY" ]; then
            alphaevo evolve "$MONITOR_STRATEGY" --method llm || echo "⚠️ 进化失败"
          elif [ "$DOM" = "01" ]; then
            alphaevo optimize --full-scan || echo "⚠️ 优化失败，跳过"
          else
            STRATEGY="${{ steps.select_strategy.outputs.alphaevo_strategy }}"
            alphaevo evolve "$STRATEGY" --method llm || echo "⚠️ 进化失败，跳过"
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: 归档所有结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quant-results-${{ github.run_id }}
          path: |
            ${{ env.WORK_DIR }}/daily_stock_analysis/data/
            ${{ env.WORK_DIR }}/daily_stock_analysis/reports/
            ${{ env.WORK_DIR }}/daily_stock_analysis/logs/
            ${{ env.WORK_DIR }}/alphaevo/reports/
            ${{ env.WORK_DIR }}/strategy_registry.json
            ${{ env.WORK_DIR }}/pricing.md
          retention-days: 30

      - name: 异常告警（邮件）
        if: failure()
        run: |
          python scripts/send_alert.py
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          ERROR_MSG: "量化流水线执行失败，请检查 Actions 日志。"