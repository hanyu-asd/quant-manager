name: 每日量化流水线

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 工作日北京时间 18:00
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WORK_DIR: /home/runner/work/quant-workspace
    steps:
      - name: 检出总控仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装通用依赖
        run: |
          pip install tickflow tushare pandas

      - name: 拉取/更新项目代码
        run: |
          chmod +x scripts/update_projects.sh
          ./scripts/update_projects.sh

      - name: 注入环境变量到 daily_stock_analysis
        run: |
          cd $WORK_DIR/daily_stock_analysis
          cp .env.example .env || true
          echo "STOCK_LIST=${{ secrets.STOCK_LIST }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}" >> .env
          echo "OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}" >> .env
          echo "TUSHARE_TOKEN=${{ secrets.TUSHARE_TOKEN }}" >> .env
          # 明确指定数据源优先级，优先 TickFlow（免费）
          echo "DATA_SOURCE_PRIORITY=tickflow,akshare,tushare,baostock,yfinance" >> .env
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" >> .env
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
          echo "EMAIL_RECEIVERS=${{ secrets.EMAIL_RECEIVERS }}" >> .env
          echo "SECRET_KEY=$(openssl rand -hex 32)" >> .env

      # ----- 阶段1: AlphaSift 选股（使用 CLI 独立运行） -----
      - name: AlphaSift 选股（生成候选池）
        run: |
          cd $WORK_DIR/daily_stock_analysis
          # 确保 alphasift 已安装（如果项目包含，否则手动安装）
          pip install -e ".[alphasift]" || pip install alphasift || true
          # 运行选股策略（例如 balanced_alpha），保存结果到 data/runs/
          alphasift screen balanced_alpha --no-llm --save-run
          # 将最新选股结果复制为标准文件名 stock_pool.csv
          # 假设最新文件在 data/runs/ 下，按时间排序取最新的
          latest_run=$(ls -t data/runs/*.csv 2>/dev/null | head -1)
          if [ -n "$latest_run" ]; then
            cp "$latest_run" data/stock_pool.csv
            echo "选股结果已保存为 data/stock_pool.csv"
          else
            echo "警告：未生成选股结果，可能策略未运行成功"
          fi
        env:
          ALPHASIFT_ENABLED: true  # 确保环境变量传递

      # ----- 调试: 列出数据目录 -----
      - name: 列出数据目录内容（调试）
        run: |
          cd $WORK_DIR/daily_stock_analysis
          echo "data/ 目录内容:"
          ls -la data/ || echo "data目录不存在"
          echo "data/runs/ 目录内容（如有）:"
          ls -la data/runs/ 2>/dev/null || echo "data/runs/ 不存在"

      # ----- 阶段2: AlphaEvo 每日回测校验 -----
      - name: AlphaEvo 每日回测校验
        run: |
          cd $WORK_DIR/alphaevo
          mkdir -p data
          # 尝试多个可能的文件名，优先从 daily_stock_analysis 复制
          if [ -f "$WORK_DIR/daily_stock_analysis/data/stock_pool.csv" ]; then
            cp $WORK_DIR/daily_stock_analysis/data/stock_pool.csv data/stock_pool_raw.csv
            echo "使用 stock_pool.csv 作为输入"
          elif [ -f "$WORK_DIR/daily_stock_analysis/data/stock_pool_raw.csv" ]; then
            cp $WORK_DIR/daily_stock_analysis/data/stock_pool_raw.csv data/stock_pool_raw.csv
            echo "使用 stock_pool_raw.csv 作为输入"
          else
            echo "错误: 未找到 stock_pool.csv 或 stock_pool_raw.csv"
            exit 1
          fi
          # 运行回测模式（仅回测，不进化）
          python $GITHUB_WORKSPACE/scripts/run_alphaevo.py backtest \
            --input data/stock_pool_raw.csv \
            --output data/stock_pool_final.csv
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # ----- 阶段3: daily_stock_analysis 分析与推送（使用最终池） -----
      - name: daily_stock_analysis 分析与推送
        run: |
          cd $WORK_DIR/daily_stock_analysis
          # 将 AlphaEvo 输出复制到 DSA 数据目录（覆盖原文件）
          cp $WORK_DIR/alphaevo/data/stock_pool_final.csv data/stock_pool.csv
          # 关闭 AlphaSift 避免重复选股，正常分析自选股+最终池
          python main.py
        env:
          ALPHASIFT_ENABLED: false

      # ----- 阶段4: AlphaEvo 策略进化（条件触发：周五或月首） -----
      - name: 判断是否运行 AlphaEvo 进化
        id: check_evo
        run: |
          DOW=$(date +%u)
          DOM=$(date +%d)
          if [ "$DOW" = "5" ] || [ "$DOM" = "01" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_evo=true" >> $GITHUB_OUTPUT
          else
            echo "run_evo=false" >> $GITHUB_OUTPUT
          fi

      - name: AlphaEvo 策略进化（条件触发）
        if: steps.check_evo.outputs.run_evo == 'true'
        run: |
          cd $WORK_DIR/alphaevo
          DOM=$(date +%d)
          if [ "$DOM" = "01" ]; then
            MODE="optimize --full-scan"
          else
            MODE="evolve --method llm"
          fi
          python $GITHUB_WORKSPACE/scripts/run_alphaevo.py $MODE
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      # ----- 归档 -----
      - name: 归档所有结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quant-results-${{ github.run_id }}
          path: |
            ${{ env.WORK_DIR }}/daily_stock_analysis/data/
            ${{ env.WORK_DIR }}/daily_stock_analysis/reports/
            ${{ env.WORK_DIR }}/daily_stock_analysis/logs/
            ${{ env.WORK_DIR }}/alphaevo/data/
            ${{ env.WORK_DIR }}/alphaevo/docs/reports/
          retention-days: 30

      # ----- 告警 -----
      - name: 异常告警（邮件）
        if: failure()
        run: |
          python scripts/send_alert.py
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          ERROR_MSG: "量化流水线执行失败，请检查 Actions 日志。"