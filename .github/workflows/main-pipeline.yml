name: 每日选股与分析

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    inputs:
      strategy:
        description: '指定策略名（不填则自动选择）'
        required: false
        type: string
        default: ''
      dry_run:
        description: '试运行模式（不发送邮件）'
        required: false
        type: boolean
        default: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: read
      actions: read

    steps:
      - name: 禁用 Git 符号链接
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip config set global.timeout 120
          pip config set global.retries 5
          
          cd daily_stock_analysis
          pip install -r requirements.txt
          pip install -e .
          pip install fake_useragent sqlalchemy pyyaml
          cd ../alphasift
          pip install -e .
          cd ../alphaevo
          pip install -e .
          pip install requests baostock akshare pandas numpy tushare tickflow zzshare

      - name: 动态主线识别 + 策略选择
        id: mainline_strategy
        run: |
          cd ${{ github.workspace }}
          if [ -n "${{ github.event.inputs.strategy }}" ]; then
            echo "${{ github.event.inputs.strategy }}" > selected_strategy.txt
            echo "SELECTED_STRATEGY=${{ github.event.inputs.strategy }}" >> $GITHUB_ENV
            echo "📊 使用指定策略: ${{ github.event.inputs.strategy }}"
          else
            python scripts/select_strategy.py
            STRATEGY=$(cat selected_strategy.txt)
            echo "SELECTED_STRATEGY=$STRATEGY" >> $GITHUB_ENV
            echo "📊 选定策略: $STRATEGY"
          fi
          if [ -f "market_state.json" ]; then
            mkdir -p daily_stock_analysis/reports/
            cp market_state.json daily_stock_analysis/reports/market_state.json
            echo "✅ 市场状态已同步"
          fi

      - name: 准备行业分类缓存（首次运行时生成）
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          cd ${{ github.workspace }}
          if [ ! -f "data/industry_cache.json" ]; then
            python scripts/update_industry_cache.py
          else
            echo "✅ 行业缓存已存在，跳过更新"
          fi

      - name: AlphaSift 全市场扫描
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            cd ${{ github.workspace }}
            STRATEGY="${{ env.SELECTED_STRATEGY }}"
            case "$STRATEGY" in
              rsi_reversion_v1)
                ALPHA_STRATEGY="oversold_reversal"
                ;;
              trend_pullback_rebound)
                ALPHA_STRATEGY="momentum_quality"
                ;;
              volume_breakout)
                ALPHA_STRATEGY="volume_breakout"
                ;;
              *)
                ALPHA_STRATEGY="$STRATEGY"
                ;;
            esac
            echo "📊 AlphaSift 使用策略: $ALPHA_STRATEGY"
            cd alphasift
            alphasift screen $ALPHA_STRATEGY --no-llm --save-run --market cn
            mkdir -p ../shared
            cp data/runs/*.json ../shared/candidates_all.json 2>/dev/null || echo '{"picks":[]}' > ../shared/candidates_all.json

      - name: 合并主线候选与全市场候选
        run: |
          cd ${{ github.workspace }}
          python scripts/merge_candidates.py

      - name: 解析选股结果并注入环境变量
        id: pass_stocks
        run: |
          if [ -f shared/candidates.json ] && [ -s shared/candidates.json ]; then
            STOCKS=$(jq -r '.picks[]? | .code' shared/candidates.json | head -10 | tr '\n' ',' | sed 's/,$//')
            echo "STOCK_LIST=$STOCKS" >> $GITHUB_ENV
            echo "已提取股票列表: $STOCKS"
          else
            echo "STOCK_LIST=${{ secrets.STOCK_LIST }}" >> $GITHUB_ENV
          fi

      - name: daily_stock_analysis 深度分析
        if: github.event.inputs.dry_run != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          LITELLM_MODEL: openai/${{ secrets.OPENAI_MODEL }}
          STOCK_LIST: ${{ env.STOCK_LIST }}
          EMAIL_ENABLED: true
          SEND_EMAIL: true
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          cd daily_stock_analysis
          python main.py

      - name: 计算候选股买卖价格
        if: github.event.inputs.dry_run != 'true'
        run: |
          cd ${{ github.workspace }}
          python pricing_calculator.py

      - name: 发送定价报告邮件
        if: github.event.inputs.dry_run != 'true'
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          cd ${{ github.workspace }}
          python pricing_calculator.py --send-email

      # ========== 可选增强：探测 AlphaEvo 适配器（首次运行后可删除） ==========
      - name: 探测 AlphaEvo 适配器
        run: |
          cd $WORK_DIR/alphaevo
          echo "🔍 AlphaEvo 支持的适配器列表："
          alphaevo run --help | grep -A 10 "adapter" || true
          echo ""
          echo "🔍 检查 DSA 适配器是否可用："
          alphaevo run --help | grep -i dsa || true

      # ========== 修改点：AlphaEvo 回测，适配器改为 dsa ==========
      - name: AlphaEvo 回测
        id: backtest
        env:
          ALPHAEVO_LOG_LEVEL: INFO
        run: |
          cd $WORK_DIR/alphaevo
          STRATEGY=$(cat ${{ github.workspace }}/selected_strategy.txt)   # 从文件读取策略名，与前面完全一致
          echo "AlphaEvo 使用策略: $STRATEGY"
          
          # 优先使用 dsa 适配器（读取 daily_stock_analysis 的缓存数据）
          if alphaevo run "$STRATEGY" --adapter dsa --output reports/; then
            echo "✅ AlphaEvo 回测成功 (DSA 缓存数据)"
            echo "backtest_success=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ DSA 适配器失败，尝试 yfinance"
            if alphaevo run "$STRATEGY" --adapter yfinance --output reports/; then
              echo "✅ AlphaEvo 回测成功 (yfinance)"
              echo "backtest_success=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ AlphaEvo 回测失败"
              echo "backtest_success=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 解析回测报告
        run: |
          cd ${{ github.workspace }}
          python scripts/parse_alphaevo_report.py

      - name: 更新策略注册表
        run: |
          cd ${{ github.workspace }}
          python scripts/update_strategy_registry.py

      - name: 上传每日报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-reports-${{ github.run_number }}
          path: |
            daily_stock_analysis/reports/
            alphasift/data/runs/
            shared/
            pricing.txt
            pricing.md
          retention-days: 7